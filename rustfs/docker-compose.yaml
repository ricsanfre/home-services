secrets:
  rustfs-secret-key:
    file: ./rustfs-secret-key

services:
  # RustFS main service
  rustfs:
    security_opt:
      - "no-new-privileges:true"
    secrets:
      - rustfs-secret-key
    image: rustfs/rustfs:latest
    container_name: rustfs-server
    ports:
      - "9000:9000" # S3 API port
      - "9001:9001" # Console port
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0..3} # Define 4 storage volumes
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY_FILE=/run/secrets/rustfs-secret-key
      - RUSTFS_TLS_PATH=/opt/tls
      # Keep strict disk topology checks enabled by default.
      # For local testing only, set `RUSTFS_UNSAFE_BYPASS_DISK_CHECK=true` explicitly.
      - RUSTFS_UNSAFE_BYPASS_DISK_CHECK=${RUSTFS_UNSAFE_BYPASS_DISK_CHECK:-false}

    volumes:
      - rustfs_data_0:/data/rustfs0
      - rustfs_data_1:/data/rustfs1
      - rustfs_data_2:/data/rustfs2
      - rustfs_data_3:/data/rustfs3
      - logs:/app/logs   
      # TLS configuration directory.
      # Place at least:
      # - /opt/tls/ca.crt
      # - /opt/tls/rustfs_cert.pem
      # - /opt/tls/rustfs_key.pem
      #- ./certs/:/opt/tls
      # Permission baseline:
      # - default RustFS runtime user is 10001:10001
      # - ensure host mounts are writable by that user, or run with host-matched user
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      # Production strict TLS example (SAN/FQDN aligned, no `-k`):
      # curl -f --cacert /opt/tls/ca.crt --resolve rustfs-a.example.com:9000:127.0.0.1 https://rustfs-a.example.com:9000/health
      # curl -f --cacert /opt/tls/ca.crt --resolve rustfs-a.example.com:9001:127.0.0.1 https://rustfs-a.example.com:9001/rustfs/console/health
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=true"
      # RUSTFS API
      - "traefik.http.routers.rustfs-api.entrypoints=websecure"
      - "traefik.http.routers.rustfs-api.rule=Host(`$RUSTFS_API`)"
      - "traefik.http.routers.rustfs-api.tls=true"
      - "traefik.http.routers.rustfs-api.tls.certresolver=ionos"
      - "traefik.http.routers.rustfs-api.service=rustfs-api"
      - "traefik.http.services.rustfs-api.loadbalancer.server.port=9000"
      # RUSTFS Console
      - "traefik.http.routers.rustfs-console.entrypoints=websecure"
      - "traefik.http.routers.rustfs-console.rule=Host(`$RUSTFS_CONSOLE`)"
      - "traefik.http.routers.rustfs-console.tls=true"
      - "traefik.http.routers.rustfs-console.tls.certresolver=ionos"
      - "traefik.http.routers.rustfs-console.service=rustfs-console"
      - "traefik.http.services.rustfs-console.loadbalancer.server.port=9001"

  volume-permission-helper:
    image: alpine
    volumes:
      - rustfs_data_0:/data0
      - rustfs_data_1:/data1
      - rustfs_data_2:/data2
      - rustfs_data_3:/data3
      - logs:/logs
    command: >
      sh -c "
        chown -R 10001:10001 /data0 /data1 /data2 /data3 /logs &&
        echo 'Volume Permissions fixed' &&
        exit 0
      "
    # Permission baseline:
    # - default RustFS runtime user is 10001:10001
    # - alternatively, run rustfs service with host-matched `user: \"<uid>:<gid>\"`
    restart: "no"

volumes:
  rustfs_data_0:
  rustfs_data_1:
  rustfs_data_2:
  rustfs_data_3:
  logs:        
        
# Use external global networks instead of default behaviour (new networs per docker-compose file)
networks:
  frontend:
    external: true