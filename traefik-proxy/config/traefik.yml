api:
  # Enable Dashboard
  dashboard: true
  debug: true


# Entry Points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    watch: true
    exposedByDefault: false
    network: frontend
  file:
    directory: /etc/traefik
    watch: true

# Logging
log:
  level: "INFO"
  filePath: "/var/log/traefik/traefik.log"
accessLog:
  filePath: "/var/log/traefik/access.log"

# Certificate resolvers
certificatesResolvers:
  ionos:
    acme:
      email: admin@ricsanfre.com
      storage: acme.json
      dnsChallenge:
        provider: ionos
        resolvers: 
          - 1.1.1.1:53
          - 8.8.8.8:53 
